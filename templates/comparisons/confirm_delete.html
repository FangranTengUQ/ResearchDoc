{% extends 'base.html' %}
{% block title %}Delete Table{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                <h4 class="fw-bold">Delete Comparison Table?</h4>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ table.title }}"</strong>?</p>
                <div class="d-flex gap-2 justify-content-center mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i>Yes, Delete
                        </button>
                    </form>
                    <a href="{% url 'projects:detail' project.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
